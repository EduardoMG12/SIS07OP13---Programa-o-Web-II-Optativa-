<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 2 - Formulario com Tabela</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f3f4f6;
            color: #1f2937;
            padding: 32px 16px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #111827;
        }

        p {
            line-height: 1.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        td {
            border: 1px solid #d1d5db;
            padding: 14px;
            vertical-align: middle;
        }

        td:first-child {
            width: 32%;
            font-weight: bold;
            background: #f9fafb;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Pratica em Sala - Formulario com Tabela</h1>
        <p>Preencha os dados do produto para visualizar o valor total gasto na compra.</p>

        <form action="processar.php" method="POST">
            <table>
                <tr>
                    <td><label for="produto">Nome do Produto</label></td>
                    <td><input type="text" id="produto" name="produto" required></td>
                </tr>
                <tr>
                    <td><label for="valor">Valor</label></td>
                    <td><input type="number" id="valor" name="valor" step="0.01" min="0" required></td>
                </tr>
                <tr>
                    <td><label for="quantidade">Quantidade Comprada</label></td>
                    <td><input type="number" id="quantidade" name="quantidade" min="1" step="1" required></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <button type="submit">Enviar</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>

</html>

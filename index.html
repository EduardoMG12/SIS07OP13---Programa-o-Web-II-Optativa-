<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depoimentos Acadêmicos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-gradient-to-br from-indigo-100 via-purple-50 to-teal-100 min-h-screen flex items-center justify-center p-4">

    <div
        class="max-w-md w-full bg-white/70 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/50 transform transition-all hover:scale-[1.01] duration-300">

        <div class="p-8">
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 text-indigo-600 mb-4 shadow-[0_0_15px_rgba(79,70,229,0.2)]">
                    <i class="fas fa-graduation-cap text-3xl"></i>
                </div>
                <h1
                    class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-teal-500">
                    Depoimentos Acadêmicos
                </h1>
                <p class="text-gray-500 text-sm mt-2">Compartilhe sua experiência conosco!</p>
            </div>

            <form action="processar.php" method="POST" class="space-y-5">

                <div>
                    <label for="nome" class="block text-sm font-medium text-gray-700 mb-1 ml-1">Nome completo <span
                            class="text-red-500">*</span></label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-500 text-gray-400">
                            <i class="fas fa-user"></i>
                        </div>
                        <input type="text" id="nome" name="nome" required
                            class="block w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/60 text-gray-900 placeholder-gray-400 transition-all shadow-sm hover:bg-white/90"
                            placeholder="Ex: João da Silva">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1 ml-1">E-mail <span
                            class="text-red-500">*</span></label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-500 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="email" name="email" required
                            class="block w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/60 text-gray-900 placeholder-gray-400 transition-all shadow-sm hover:bg-white/90"
                            placeholder="Ex: joao@exemplo.com.br">
                    </div>
                </div>

                <div>
                    <label for="curso" class="block text-sm font-medium text-gray-700 mb-1 ml-1">Curso</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-500 text-gray-400">
                            <i class="fas fa-book"></i>
                        </div>
                        <input type="text" id="curso" name="curso"
                            class="block w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/60 text-gray-900 placeholder-gray-400 transition-all shadow-sm hover:bg-white/90"
                            placeholder="Análise e Desenvolvimento de Sistemas">
                    </div>
                </div>

                <div>
                    <label for="depoimento" class="block text-sm font-medium text-gray-700 mb-1 ml-1">Depoimento</label>
                    <div class="relative group">
                        <div
                            class="absolute top-3 left-3.5 flex items-start pointer-events-none transition-colors group-focus-within:text-indigo-500 text-gray-400">
                            <i class="fas fa-comment-dots"></i>
                        </div>
                        <textarea id="depoimento" name="depoimento" rows="4"
                            class="block w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/60 text-gray-900 placeholder-gray-400 transition-all shadow-sm hover:bg-white/90 resize-none"
                            placeholder="Neste projeto eu aprendi sobre..."></textarea>
                    </div>
                </div>

                <button type="submit"
                    class="w-full mt-4 flex justify-center items-center py-3.5 px-4 rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0">
                    <span>Enviar Depoimento</span>
                    <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>
        </div>
    </div>

</body>

</html>
